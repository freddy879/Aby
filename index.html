<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Para Aby — Un recordatorio</title>
  <style>
    :root{--bg1:#0f172a;--bg2:#0b1220;--accent:#ff3c78;--text:#e6edf3}
    html,body{height:100%;margin:0;font-family:'Poppins',system-ui,sans-serif}
    body{
      background: radial-gradient(circle at 10% 10%, rgba(255,60,120,0.12), transparent 60%),
                  radial-gradient(circle at 90% 90%, rgba(58,123,213,0.08), transparent 60%),
                  linear-gradient(180deg,var(--bg1),var(--bg2));
      color:var(--text);display:flex;align-items:center;justify-content:center;padding:16px;overflow-x:hidden;
    }
    .card{
      width:100%;max-width:600px;background:rgba(255,255,255,0.05);
      border-radius:20px;padding:24px 18px;box-shadow:0 10px 30px rgba(0,0,0,0.5);
      border:1px solid rgba(255,255,255,0.1);text-align:center;position:relative;overflow:hidden;
    }
    h1{font-size:clamp(20px,5vw,28px);margin:0 0 8px;}
    .sub{opacity:0.9;margin-bottom:18px;font-size:clamp(14px,3.5vw,17px)}
    .messageBox{
      background:rgba(255,255,255,0.03);padding:18px;border-radius:12px;min-height:110px;
      font-size:clamp(15px,4vw,18px);line-height:1.5;color:#f8f9fb;position:relative;word-wrap:break-word;
    }
    .cursor{display:inline-block;width:8px;height:20px;background:var(--accent);margin-left:4px;animation:blink 1s steps(2) infinite}
    @keyframes blink{50%{opacity:0}}
    .hearts{position:absolute;inset:0;pointer-events:none}
    .heart{position:absolute;width:16px;height:16px;transform:translate(-50%,-50%) rotate(-45deg);opacity:0.9}
    .heart:before,.heart:after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--accent)}
    .heart:before{top:-8px;left:0}
    .heart:after{left:8px;top:0}
    .controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:16px}
    .btn{background:transparent;border:1px solid rgba(255,255,255,0.1);padding:10px 14px;border-radius:10px;cursor:pointer;color:inherit;font-weight:600;transition:all .3s}
    .btn.primary{background:linear-gradient(90deg,var(--accent),#ff6e9e);color:#071021;border:none;box-shadow:0 6px 18px rgba(255,60,120,0.14)}
    .btn:hover{transform:scale(1.05)}
    .footer{margin-top:14px;font-size:12px;color:rgba(230,237,243,0.7)}
  </style>
</head>
<body>
  <div class="card">
    <div class="hearts" id="heartsContainer"></div>
    <h1>Para <strong>Aby</strong></h1>
    <div class="sub">Un detallito para recordarte que no estás sola 💖</div>
    <div class="messageBox" id="messageBox"></div>
    <div class="controls">
      <button class="btn primary" id="replayBtn">Reproducir</button>
      <button class="btn" id="confettiBtn">Más corazones</button>
    </div>
    <div class="footer">Hecho con cariño 💞 — Compatible con celular 💫</div>
  </div>

  <script>
    const texto = `Vamo mi amor tu puedes no te rindas solo te recuerda que eres una mujer super inteligente y capaz de muchas cosas y nunca olvides que estare aqui para ti`;
    const box = document.getElementById('messageBox');
    const cursor = document.createElement('span');cursor.className='cursor';

    function playTypewriter(txt,speed=40){
      box.innerHTML='';let i=0;box.appendChild(cursor);cursor.style.display='inline-block';
      const interval=setInterval(()=>{
        if(i<txt.length){box.insertBefore(document.createTextNode(txt[i]===' '?'\u00A0':txt[i]),cursor);i++;}
        else{clearInterval(interval);cursor.style.display='none';burstHearts(10);}
      },speed);
    }

    const heartsContainer=document.getElementById('heartsContainer');
    function makeHeart(xPerc,yPerc,scale=1){
      const h=document.createElement('div');h.className='heart';h.style.left=xPerc+'%';h.style.top=yPerc+'%';
      h.style.transform+=` scale(${scale}) rotate(-45deg)`;heartsContainer.appendChild(h);
      const dur=3000+Math.random()*2000;
      h.animate([{transform:`translate(-50%,-50%) scale(${scale}) rotate(-45deg)`,opacity:1},{transform:`translate(-50%,-50%) translateY(-100px) scale(${scale*0.8}) rotate(-25deg)`,opacity:0}],{duration:dur,easing:'ease-out'});
      setTimeout(()=>h.remove(),dur+50);
    }
    function burstHearts(count=6){for(let i=0;i<count;i++){setTimeout(()=>{makeHeart(50+Math.random()*40-20,70+Math.random()*20-10,0.8+Math.random()*0.8)},i*100);}}

    document.getElementById('replayBtn').addEventListener('click',()=>playTypewriter(texto,30));
    document.getElementById('confettiBtn').addEventListener('click',()=>burstHearts(15));

    window.addEventListener('load',()=>setTimeout(()=>playTypewriter(texto,30),400));
  </script>
</body>
</html>
