```html
<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Para Aby 💖</title>

<style>
:root{
  --bg:#fff0f5;
  --card:#ffffff;
  --accent:#f8a5c2;
  --accent2:#ff6b9a;
  --text:#444;
}

body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(180deg,#fff0f5,#ffe4ec);
  font-family:'Poppins',sans-serif;
}

.card{
  width:90%;
  max-width:500px;
  background:white;
  padding:25px;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  position:relative;
}

h1{color:var(--accent2);}

.messageBox{
  background:#fff5f8;
  padding:15px;
  border-radius:10px;
  margin:15px 0;
  color:#555;
}

.btn{
  padding:10px 18px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  margin:10px;
  transition:.3s;
}

.si{
  background:linear-gradient(90deg,var(--accent),var(--accent2));
  color:white;
}

.no{
  background:#eee;
  position:absolute;
}

#respuesta{
  margin-top:15px;
  display:none;
  color:var(--accent2);
  font-size:18px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="card">
  <h1>Para Aby 💕</h1>

  <div class="messageBox">
    Te amo... eres lo más bonito que tengo en mi vida, que no haria por ti mi corazoncito bello si eres mi vida entera 💖
  </div>

  <h3 style="color:#ff6b9a;">
    Amorcito mío… ¿quieres ir conmigo al cine el martes a ver Boulevard? 🎬💖
  </h3>

  <div>
    <button class="btn si" onclick="aceptar()">Sí 💖</button>
    <button class="btn no" id="noBtn">No 😢</button>
  </div>

  <div id="respuesta">
    Sabía que dirías que sí 😍💖 Te amo muchísimo mi osita 🐻💕
  </div>
</div>

<script>
function aceptar(){
  document.getElementById("respuesta").style.display="block";
}

// botón "No" se mueve 😏
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover",()=>{
  const x = Math.random() * 300;
  const y = Math.random() * 200;
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
});
</script>

</body>
</html>
```
