<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXUS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<script src="https://meet.jit.si/external_api.js"></script>

<style>

:root{
  --orange:#ff6b2b;
  --orange2:#ff914d;
  --bg:#f4f7fb;
  --card:#ffffff;
  --text:#1e293b;
  --muted:#64748b;
  --border:#e2e8f0;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* SIDEBAR */

.sidebar{
  width:250px;
  background:white;
  border-right:1px solid var(--border);
  position:fixed;
  top:0;
  left:0;
  bottom:0;
  padding:24px 14px;
}

.logo{
  font-size:28px;
  font-weight:800;
  margin-bottom:30px;
}

.logo span{
  color:var(--orange);
}

.nav{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.nav a{
  text-decoration:none;
  color:var(--muted);
  padding:14px;
  border-radius:14px;
  transition:0.2s;
  font-weight:600;
}

.nav a:hover{
  background:#f8fafc;
}

.nav .active{
  background:#fff1eb;
  color:var(--orange);
}

/* MAIN */

.main{
  margin-left:250px;
  min-height:100vh;
}

/* TOPBAR */

.topbar{
  height:75px;
  background:white;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 30px;
  position:sticky;
  top:0;
  z-index:100;
}

.top-title{
  font-size:24px;
  font-weight:800;
}

.online{
  background:#ecfdf5;
  color:#16a34a;
  padding:8px 14px;
  border-radius:30px;
  font-weight:700;
  font-size:13px;
}

/* CONTENT */

.content{
  padding:30px;
}

/* HERO */

.hero{
  background:white;
  border-radius:28px;
  padding:40px;
  border:1px solid var(--border);
  margin-bottom:30px;
}

.hero h1{
  font-size:42px;
  line-height:1.1;
  margin-bottom:12px;
}

.hero p{
  color:var(--muted);
  line-height:1.7;
  max-width:700px;
}

.room-input{
  width:100%;
  margin-top:25px;
  padding:18px;
  border-radius:18px;
  border:1px solid var(--border);
  outline:none;
  font-size:15px;
}

.hero-actions{
  margin-top:20px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

.btn{
  border:none;
  padding:16px 24px;
  border-radius:16px;
  font-weight:700;
  cursor:pointer;
  transition:0.2s;
}

.btn-primary{
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  color:white;
  box-shadow:0 8px 25px rgba(255,107,43,0.25);
}

.btn-primary:hover{
  transform:translateY(-2px);
}

.btn-secondary{
  background:#f8fafc;
}

/* CALENDAR */

.schedule-box{
  background:white;
  border-radius:28px;
  padding:30px;
  border:1px solid var(--border);
  margin-bottom:30px;
}

.schedule-grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:16px;
  margin-top:20px;
}

.schedule-input{
  padding:16px;
  border-radius:16px;
  border:1px solid var(--border);
  outline:none;
  font-size:14px;
}

.schedule-btn{
  background:linear-gradient(135deg,var(--orange),var(--orange2));
  border:none;
  color:white;
  border-radius:16px;
  cursor:pointer;
  font-weight:700;
}

/* MEETINGS */

.meeting-list{
  margin-top:25px;
  display:grid;
  gap:14px;
}

.meeting-item{
  background:#f8fafc;
  border-radius:18px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
  gap:20px;
}

.join-btn{
  background:var(--orange);
  color:white;
  border:none;
  padding:12px 18px;
  border-radius:14px;
  cursor:pointer;
  font-weight:700;
}

/* FULLSCREEN */

.fullscreen-meeting{
  position:fixed;
  inset:0;
  background:black;
  z-index:999999;
  display:none;
  flex-direction:column;
}

.fullscreen-top{
  height:70px;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  gap:14px;
  padding:0 20px;
  color:white;
  backdrop-filter:blur(10px);
}

.back-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  border:none;
  background:rgba(255,255,255,0.15);
  color:white;
  font-size:20px;
  cursor:pointer;
}

#meet{
  flex:1;
}

/* MOBILE */

@media(max-width:900px){

  .sidebar{
    display:none;
  }

  .main{
    margin-left:0;
  }

  .hero h1{
    font-size:32px;
  }

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

  <div class="logo">
    NE<span>XUS</span>
  </div>

  <div class="nav">

    <a href="feed.html">
      📋 Feed
    </a>

    <a href="videollamada.html" class="active">
      📹 Videollamadas
    </a>

    <a href="archivos.html">
      📁 Archivos
    </a>

    <a href="miembros.html">
      👥 Miembros
    </a>

    <a href="perfil.html">
      👤 Perfil
    </a>

  </div>

</div>

<!-- MAIN -->

<div class="main">

  <div class="topbar">

    <div class="top-title">
      Videollamadas Empresariales
    </div>

    <div class="online">
      ● Sistema conectado
    </div>

  </div>

  <div class="content">

    <!-- HERO -->

    <div class="hero">

      <h1>
        Reuniones profesionales para tu equipo
      </h1>

      <p>
        Videollamadas empresariales GRATIS usando Jitsi Meet.
        Comparte pantalla, audio, cámara y chat en tiempo real.
      </p>

      <input
        type="text"
        id="roomName"
        class="room-input"
        placeholder="Nombre de la sala"
      >

      <div class="hero-actions">

        <button
          class="btn btn-primary"
          onclick="createMeeting()"
        >
          🚀 Crear reunión
        </button>

        <button
          class="btn btn-secondary"
          onclick="joinRandom()"
        >
          ⚡ Sala rápida
        </button>

      </div>

    </div>

    <!-- CALENDAR -->

    <div class="schedule-box">

      <h2>
        📅 Agendar reunión
      </h2>

      <div class="schedule-grid">

        <input
          type="text"
          id="meetingTitle"
          class="schedule-input"
          placeholder="Título"
        >

        <input
          type="date"
          id="meetingDate"
          class="schedule-input"
        >

        <input
          type="time"
          id="meetingTime"
          class="schedule-input"
        >

        <button
          class="schedule-btn"
          onclick="scheduleMeeting()"
        >
          Guardar
        </button>

      </div>

      <div
        class="meeting-list"
        id="meetingList"
      ></div>

    </div>

  </div>

</div>

<!-- FULLSCREEN -->

<div
  class="fullscreen-meeting"
  id="fullscreenMeeting"
>

  <div class="fullscreen-top">

    <button
      class="back-btn"
      onclick="closeMeeting()"
    >
      ←
    </button>

    <div>

      <div style="font-weight:700">
        Sala empresarial
      </div>

      <div
        id="roomLabel"
        style="
        font-size:13px;
        opacity:0.7;
        "
      ></div>

    </div>

  </div>

  <div id="meet"></div>

</div>

<script>

/* ========================================= */
/* USER */
/* ========================================= */

const currentUser =
  JSON.parse(
    localStorage.getItem('by_user')
  ) || {

    name:'Invitado'

  };

/* ========================================= */
/* STORAGE */
/* ========================================= */

let meetings =
  JSON.parse(
    localStorage.getItem(
      'NEXUS_meetings'
    )
  ) || [];

renderMeetings();

/* ========================================= */
/* CREATE */
/* ========================================= */

function createMeeting(){

  let room =
    document
    .getElementById('roomName')
    .value
    .trim();

  if(room === ''){

    room =
      'NEXUS-' +
      Math.random()
      .toString(36)
      .substring(2,8);

  }

  openMeeting(room);

}

/* ========================================= */
/* RANDOM */
/* ========================================= */

function joinRandom(){

  const room =
    'NEXUS-' +
    Math.random()
    .toString(36)
    .substring(2,8);

  openMeeting(room);

}

/* ========================================= */
/* OPEN */
/* ========================================= */

let api = null;

function openMeeting(roomName){

  document
  .getElementById(
    'fullscreenMeeting'
  )
  .style.display = 'flex';

  document
  .getElementById(
    'roomLabel'
  )
  .innerHTML = roomName;

  if(api){

    api.dispose();

  }

  document
  .getElementById('meet')
  .innerHTML = '';

  const domain = 'meet.jit.si';

  const options = {

    roomName: roomName,

    width: '100%',

    height: '100%',

    parentNode:
      document.querySelector('#meet'),

    userInfo: {

      displayName:
        currentUser.name

    },

    configOverwrite: {

      prejoinPageEnabled:false,

      startWithAudioMuted:false,

      startWithVideoMuted:false

    },

    interfaceConfigOverwrite: {

      SHOW_JITSI_WATERMARK:false,

      MOBILE_APP_PROMO:false

    }

  };

  api =
    new JitsiMeetExternalAPI(
      domain,
      options
    );

}

/* ========================================= */
/* CLOSE */
/* ========================================= */

function closeMeeting(){

  document
  .getElementById(
    'fullscreenMeeting'
  )
  .style.display = 'none';

  if(api){

    api.dispose();

  }

}

/* ========================================= */
/* SCHEDULE */
/* ========================================= */

function scheduleMeeting(){

  const title =
    document
    .getElementById(
      'meetingTitle'
    )
    .value;

  const date =
    document
    .getElementById(
      'meetingDate'
    )
    .value;

  const time =
    document
    .getElementById(
      'meetingTime'
    )
    .value;

  if(!title || !date || !time){

    alert(
      'Completa todos los campos'
    );

    return;

  }

  const room =
    'NEXUS-' +
    Math.random()
    .toString(36)
    .substring(2,8);

  meetings.push({

    title,
    date,
    time,
    room,

    createdBy:
      currentUser.name

  });

  localStorage.setItem(

    'Teamyanbal_meetings',

    JSON.stringify(meetings)

  );

  renderMeetings();

}

/* ========================================= */
/* RENDER */
/* ========================================= */

function renderMeetings(){

  const list =
    document.getElementById(
      'meetingList'
    );

  list.innerHTML = '';

  meetings.forEach((meeting)=>{

    list.innerHTML += `

      <div class="meeting-item">

        <div>

          <h3>
            ${meeting.title}
          </h3>

          <p>
            📅 ${meeting.date}
            ⏰ ${meeting.time}
          </p>

          <p>
            👤 ${meeting.createdBy}
          </p>

        </div>

        <button
          class="join-btn"
          onclick="openMeeting('${meeting.room}')"
        >
          Entrar
        </button>

      </div>

    `;

  });

}

</script>

</body>
</html>
